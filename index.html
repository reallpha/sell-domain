<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>این دامنه برای فروش است</title>
  <meta name="description" content="این دامنه برای فروش می‌باشد. برای خرید تماس بگیرید.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700;900&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --primary: #2563eb;
      --text-main: #0f172a;
      --text-sub: #475569;
    }

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100dvh;
      width: 100vw;
      overflow: hidden;
    }

    body {
      font-family: 'Vazirmatn', system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(-45deg, #dbeafe, #e0f2fe, #dcfce7, #fce7f3, #e0e7ff, #fee2e2);
      background-size: 400% 400%;
      animation: gradientShift 20s ease infinite;
      color: var(--text-main);
      position: relative;
      padding: 1.5rem;
    }

    @keyframes gradientShift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.35;
      pointer-events: none;
      z-index: 1;
      will-change: transform;
    }
    .blob-1 {
      width: 520px;
      height: 520px;
      background: #3b82f6;
      top: -180px;
      right: -180px;
      animation: float 12s ease-in-out infinite alternate;
    }
    .blob-2 {
      width: 480px;
      height: 480px;
      background: #10b981;
      bottom: -160px;
      left: -160px;
      animation: float 12s ease-in-out infinite alternate -4s;
    }
    .blob-3 {
      width: 320px;
      height: 320px;
      background: #ef4444;
      top: 45%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation: float 12s ease-in-out infinite alternate -8s;
    }

    @keyframes float {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(20px, -20px) scale(1.05); }
    }

    .card {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 420px;
      max-height: 95dvh;
      background: rgba(255, 255, 255, 0.25);
      border: 1.5px solid rgba(255, 255, 255, 0.6);
      border-radius: 32px;
      padding: 2.5rem 2.25rem;
      backdrop-filter: blur(40px) saturate(180%);
      -webkit-backdrop-filter: blur(40px) saturate(180%);
      box-shadow: 
        0 30px 60px -15px rgba(0, 0, 0, 0.1),
        inset 0 0 0 1px rgba(255, 255, 255, 0.3),
        inset 0 1px 0 rgba(255, 255, 255, 0.8);
      transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .card:hover {
      transform: translateY(-8px);
    }

    .icon-box {
      width: 72px;
      height: 72px;
      margin: 0 auto 1.75rem;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.4);
      border: 1.5px solid rgba(255, 255, 255, 0.7);
      border-radius: 20px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 
        0 8px 20px rgba(0, 0, 0, 0.08),
        inset 0 0 0 1px rgba(255, 255, 255, 0.4);
    }

    h1 {
      font-size: clamp(1rem, 5vw, 1.85rem);
      white-space: nowrap;
      font-weight: 900;
      letter-spacing: -0.04em;
      text-align: center;
      line-height: 1.3;
      margin-bottom: 0.75rem;
    }

    .subtitle {
      text-align: center;
      font-size: 0.95rem;
      line-height: 1.7;
      color: var(--text-sub);
      margin-bottom: 2rem;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      width: 100%;
      padding: 1.1rem;
      font-size: 1.05rem;
      font-weight: 700;
      border-radius: 18px;
      text-decoration: none;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
      flex-shrink: 0;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    .btn svg {
      width: 22px;
      height: 22px;
      flex-shrink: 0;
    }

    .btn-phone {
      background: rgba(37, 99, 235, 0.15);
      border: 1.5px solid rgba(37, 99, 235, 0.3);
      color: #1e40af;
      box-shadow: 
        0 8px 20px rgba(37, 99, 235, 0.15),
        inset 0 0 0 1px rgba(255, 255, 255, 0.2);
      margin-bottom: 0.75rem;
    }

    .btn-phone:hover {
      background: rgba(37, 99, 235, 0.25);
      border-color: rgba(37, 99, 235, 0.45);
      transform: translateY(-2px);
      box-shadow: 
        0 12px 28px rgba(37, 99, 235, 0.25),
        inset 0 0 0 1px rgba(255, 255, 255, 0.3);
    }

    .btn-wa {
      background: rgba(16, 185, 129, 0.12);
      border: 1.5px solid rgba(16, 185, 129, 0.25);
      color: #065f46;
      box-shadow: 
        0 8px 20px rgba(16, 185, 129, 0.1),
        inset 0 0 0 1px rgba(255, 255, 255, 0.2);
      margin-bottom: 0.75rem;
    }

    .btn-wa:hover {
      background: rgba(16, 185, 129, 0.2);
      border-color: rgba(16, 185, 129, 0.4);
      transform: translateY(-2px);
      box-shadow: 
        0 12px 28px rgba(16, 185, 129, 0.18),
        inset 0 0 0 1px rgba(255, 255, 255, 0.3);
    }

    .btn-tg {
      background: rgba(0, 136, 204, 0.12);
      border: 1.5px solid rgba(0, 136, 204, 0.25);
      color: #0c4a6e;
      box-shadow: 
        0 8px 20px rgba(0, 136, 204, 0.1),
        inset 0 0 0 1px rgba(255, 255, 255, 0.2);
    }

    .btn-tg:hover {
      background: rgba(0, 136, 204, 0.2);
      border-color: rgba(0, 136, 204, 0.4);
      transform: translateY(-2px);
      box-shadow: 
        0 12px 28px rgba(0, 136, 204, 0.18),
        inset 0 0 0 1px rgba(255, 255, 255, 0.3);
    }

    .owner-name {
      text-align: center;
      font-size: 0.95rem;
      font-weight: 700;
      margin-top: 1.75rem;
      margin-bottom: 0.25rem;
      letter-spacing: -0.02em;
    }

    .footer-link {
      display: block;
      text-align: center;
      font-size: 0.75rem;
      color: var(--text-sub);
      text-decoration: none;
      opacity: 0.6;
      transition: opacity 0.3s ease, color 0.3s ease;
      margin-top: 0.5rem;
      font-weight: 500;
    }
    .footer-link:hover {
      opacity: 1;
      color: var(--primary);
    }

    .sale-note {
      display: block;
      text-align: center;
      font-size: 0.8rem;
      color: var(--text-sub);
      opacity: 0.7;
      margin-top: 1rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      direction: ltr;
    }

    @media (max-width: 480px) {
      .card {
        padding: 2.25rem 1.75rem;
      }
    }

    @media (max-height: 600px) {
      body {
        padding: 1rem;
      }
      .card {
        padding: 1.5rem;
        border-radius: 24px;
      }
      .icon-box {
        width: 56px;
        height: 56px;
        margin-bottom: 1.25rem;
      }
      .icon-box svg {
        width: 32px;
        height: 32px;
      }
      h1 {
        font-size: 1.1rem;
        margin-bottom: 0.5rem;
      }
      .subtitle {
        font-size: 0.85rem;
        margin-bottom: 1.25rem;
      }
      .btn {
        padding: 0.9rem;
        font-size: 0.95rem;
      }
      .btn svg {
        width: 20px;
        height: 20px;
      }
      .btn-phone,
      .btn-wa {
        margin-bottom: 0.6rem;
      }
      .owner-name {
        margin-top: 1.25rem;
        font-size: 0.85rem;
      }
      .footer-link {
        font-size: 0.7rem;
      }
      .sale-note {
        font-size: 0.7rem;
        margin-top: 0.75rem;
      }
    }
  </style>
</head>
